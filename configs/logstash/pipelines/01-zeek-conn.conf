input {
  file {
    path => "/data/logs/zeek/current/conn.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => plain
  }
}

filter {
  # Ignorer les commentaires Zeek
  if [message] =~ /^#/ {
    drop { }
  }

  # Parser le TSV Zeek (conn.log a ~22 champs)
  dissect {
    mapping => {
      "message" => "%{ts}	%{uid}	%{id.orig_h}	%{id.orig_p}	%{id.resp_h}	%{id.resp_p}	%{proto}	%{service}	%{duration}	%{orig_bytes}	%{resp_bytes}	%{conn_state}	%{local_orig}	%{local_resp}	%{missed_bytes}	%{history}	%{orig_pkts}	%{orig_ip_bytes}	%{resp_pkts}	%{resp_ip_bytes}	%{tunnel_parents}"
    }
  }

  # Convertir timestamp UNIX en @timestamp
  date {
    match => ["ts", "UNIX"]
    target => "@timestamp"
  }

  # Convertir types
  mutate {
    convert => {
      "id.orig_p" => "integer"
      "id.resp_p" => "integer"
      "duration" => "float"
      "orig_bytes" => "integer"
      "resp_bytes" => "integer"
      "orig_pkts" => "integer"
      "resp_pkts" => "integer"
    }
    rename => {
      "id.orig_h" => "src_ip"
      "id.resp_h" => "dst_ip"
      "id.orig_p" => "src_port"
      "id.resp_p" => "dst_port"
    }
    add_field => {
      "log_type" => "zeek"
      "event_type" => "connection"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "zeek-conn-%{+YYYY.MM.dd}"
  }
}

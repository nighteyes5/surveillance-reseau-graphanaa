input {
  file {
    path => "/data/logs/ettercap/ettercap.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
  }
}

filter {
  mutate {
    add_field => {
      "log_type" => "ettercap"
      "event_type" => "mitm_detection"
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "ettercap-%{+YYYY.MM.dd}"
  }
}
